<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Shop Collection | Your Bags Kampala</title>
    <link rel="stylesheet" href="css/base.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Cart Sidebar Styles */
      .cart-sidebar {
        position: fixed;
        top: 0;
        right: -400px;
        width: 380px;
        max-width: 90%;
        height: 100%;
        background: white;
        box-shadow: -5px 0 30px rgba(0, 0, 0, 0.2);
        z-index: 10001;
        transition: right 0.3s ease;
        display: flex;
        flex-direction: column;
      }

      .cart-sidebar.active {
        right: 0;
      }

      .cart-header {
        background: linear-gradient(135deg, #25d366, #128c7e);
        color: white;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .cart-header h3 {
        margin: 0;
        font-size: 1.3rem;
      }

      .close-cart {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        font-size: 28px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        cursor: pointer;
        transition: background 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
        position: relative;
        z-index: 10003;
      }

      .close-cart:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .close-cart:active {
        background: rgba(255, 255, 255, 0.5);
      }

      /* Mobile touch-friendly */
      @media (max-width: 768px) {
        .close-cart {
          width: 48px;
          height: 48px;
          font-size: 32px;
        }
      }

      .cart-items {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
      }

      .cart-item {
        display: flex;
        gap: 12px;
        padding: 12px;
        background: #f9f9f9;
        border-radius: 12px;
        margin-bottom: 12px;
        position: relative;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .cart-item img {
        width: 70px;
        height: 70px;
        object-fit: cover;
        border-radius: 8px;
      }

      .cart-item-info {
        flex: 1;
      }

      .cart-item-info h4 {
        margin: 0 0 5px 0;
        font-size: 0.95rem;
        color: #333;
      }

      .cart-item-info .price {
        color: #25d366;
        font-weight: bold;
        margin: 0 0 8px 0;
      }

      .cart-item-qty {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .cart-item-qty button {
        width: 28px;
        height: 28px;
        border: 1px solid #ddd;
        background: white;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        color: #25d366;
        transition: all 0.2s;
      }

      .cart-item-qty button:hover {
        background: #25d366;
        color: white;
        border-color: #25d366;
      }

      .cart-item-qty span {
        font-weight: bold;
        min-width: 25px;
        text-align: center;
      }

      .cart-footer {
        padding: 20px;
        border-top: 1px solid #eee;
        background: white;
      }

      .cart-total {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        font-size: 1.2rem;
      }

      .cart-total span:first-child {
        color: #666;
      }

      .cart-total span:last-child {
        color: #25d366;
        font-weight: bold;
        font-size: 1.4rem;
      }

      .checkout-btn {
        width: 100%;
        padding: 15px;
        background: #25d366;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .checkout-btn:hover {
        background: #128c7e;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
      }

      .empty-cart {
        text-align: center;
        color: #999;
        padding: 40px 20px;
      }

      .empty-cart i {
        font-size: 50px;
        color: #ddd;
        margin-bottom: 15px;
      }

      .cart-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 10000;
        display: none;
      }

      .cart-overlay.active {
        display: block;
      }

      /* SHOP CONTROL BAR */
      .shop-controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        padding: 20px 8%;
        background: var(--cream);
        align-items: center;
      }

      .search-wrapper {
        position: relative;
        width: 100%;
      }
      .search-wrapper i {
        position: absolute;
        left: 15px;
        top: 14px;
        color: #aaa;
      }
      .search-input {
        width: 100%;
        padding: 12px 15px 12px 40px;
        border: 1px solid #ddd;
        border-radius: 30px;
        outline: none;
      }

      .sort-select {
        padding: 12px 20px;
        border-radius: 30px;
        border: 1px solid #ddd;
        background: white;
        cursor: pointer;
        outline: none;
        font-size: 14px;
      }

      /* FILTERS */
      .filter-bar {
        display: flex;
        justify-content: center;
        gap: 10px;
        padding: 15px 8%;
        overflow-x: auto;
        background: var(--cream);
        border-bottom: 1px solid #eee;
      }
      .f-btn {
        padding: 8px 18px;
        border: 1px solid var(--purple);
        background: white;
        border-radius: 20px;
        cursor: pointer;
        white-space: nowrap;
        font-size: 13px;
        font-weight: 600;
        transition: 0.3s;
      }
      .f-btn i {
        margin-right: 5px;
      }
      .f-btn.active {
        background: #25d366;
        color: white;
      }

      /* GRID */
      .shop-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 18px;
        padding: 28px 8%;
        min-height: 280px;
      }

      /* PRODUCT CARD UPGRADES */
      .bag-card {
        border: 1px solid #eee;
        padding: 8px;
        border-radius: 12px;
        text-align: center;
        background: white;
        transition: 0.3s;
        position: relative;
      }
      .bag-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
      }

      /* New Badge */
      .badge {
        position: absolute;
        top: 8px;
        left: 8px;
        background: var(--purple);
        color: white;
        font-size: 9px;
        font-weight: bold;
        padding: 3px 8px;
        border-radius: 20px;
        text-transform: uppercase;
        z-index: 5;
      }

      .bag-card img {
        width: 100%;
        height: 130px;
        object-fit: cover;
        border-radius: 10px;
      }

      .bag-card h3 {
        font-size: 1rem;
        line-height: 1.2;
        margin: 8px 0 4px;
      }

      /* Specs */
      .bag-specs {
        display: flex;
        justify-content: center;
        gap: 8px;
        font-size: 9px;
        color: #888;
        margin-top: 4px;
      }

      .stars {
        color: #ffcc00;
        margin: 4px 0;
        font-size: 11px;
      }
      .review-count {
        font-size: 9px;
        color: gray;
        margin-left: 4px;
        text-decoration: underline;
        cursor: pointer;
      }

      .bag-card .cta-wa {
        padding: 8px 10px;
        font-size: 0.85rem;
      }

      /* MODAL */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 3000;
        justify-content: center;
        align-items: center;
      }
      .modal-content {
        background: white;
        padding: 30px;
        border-radius: 20px;
        width: 90%;
        max-width: 400px;
      }
      .modal-content input,
      .modal-content textarea {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 10px;
      }

      @media (max-width: 768px) {
        .shop-controls {
          grid-template-columns: 1fr;
        }
        .shop-grid {
          grid-template-columns: repeat(2, 1fr);
          padding: 20px 5%;
        }
        .bag-card img {
          height: 125px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Shop Banner -->
    <div class="shop-banner">
      <h1 style="color: white">Our Collection</h1>
      <p style="color: #ccc">Premium bags for every occasion</p>
    </div>

    <header>
      <a href="index.html" class="logo-container" style="text-decoration: none">
        <img
          src="images/Logo.jpeg"
          alt="Logo"
          class="logo-img"
          onerror="this.src = 'https://via.placeholder.com/45'"
        />
        <div class="brand"><h1>Your Bags Kampala</h1></div>
      </a>
      <nav>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
        <a href="shop.html">Products</a>
        <a href="https://wa.me/256764266189" target="_blank" class="cta-wa"
          >WhatsApp</a
        >
      </nav>
    </header>

    <!-- SEARCH & SORT AREA -->
    <div class="shop-controls">
      <div class="search-wrapper">
        <i class="fa fa-search"></i>

          type="text"
          id="searchInput"

      </div>
      <select id="sortOrder" class="sort-select" onchange="handleSort()">
        <option value="default">Sort: Recommended</option>
        <option value="low">Price: Low to High</option>
        <option value="high">Price: High to Low</option>
      </select>
    </div>

    <!-- FILTERS -->
    <div class="filter-bar">
      <button
        class="f-btn active"
        data-cat="all"
        onclick="filterBags('all', this)"
      >
        <i class="fas fa-th"></i> All
      </button>
      <button class="f-btn" data-cat="new" onclick="filterBags('new', this)">
        <i class="fas fa-star"></i> New Arrivals
      </button>
      <button class="f-btn" data-cat="sale" onclick="filterBags('sale', this)">
        <i class="fas fa-fire"></i> Best Sellers
      </button>
      <button
        class="f-btn"
        data-cat="Shoulder Bags"
        onclick="filterBags('Shoulder Bags', this)"
      >
        <i class="fas fa-shopping-bag"></i> Shoulder Bags
      </button>
      <button
        class="f-btn"
        data-cat="Tote Bags"
        onclick="filterBags('Tote Bags', this)"
      >
        <i class="fas fa-shopping-basket"></i> Tote Bags
      </button>
      <button
        class="f-btn"
        data-cat="Laptop Bags"
        onclick="filterBags('Laptop Bags', this)"
      >
        <i class="fas fa-briefcase"></i> Laptop Bags
      </button>
      <button
        class="f-btn"
        data-cat="Clutch Bags"
        onclick="filterBags('Clutch Bags', this)"
      >
        <i class="fas fa-wallet"></i> Clutch Bags
      </button>
      <button
        class="f-btn"
        data-cat="Backpack Bags"
        onclick="filterBags('Backpack Bags', this)"
      >
        <i class="fas fa-backpack"></i> Backpack Bags
      </button>
      <button
        class="f-btn"
        data-cat="Travel Bags"
        onclick="filterBags('Travel Bags', this)"
      >
        <i class="fas fa-plane"></i> Travel Bags
      </button>
    </div>

    <!-- MAIN SHOP DISPLAY -->
    <div id="shop-container" class="shop-grid"></div>

    <!-- REVIEW MODAL -->
    <div id="reviewModal" class="modal">
      <div class="modal-content">
        <h3>Write a Review</h3>
        <input type="text" id="revName" placeholder="Your Name" />
        <select
          id="revRating"
          style="width: 100%; padding: 10px; border-radius: 10px"
        >
          <option value="5">5 Stars - Excellent</option>
          <option value="4">4 Stars - Very Good</option>
          <option value="3">3 Stars - Average</option>
        </select>
        <textarea
          id="revComment"
          placeholder="Your experience..."
          rows="4"
        ></textarea>
        <button
          onclick="submitReview()"
          class="cta-wa"
          style="width: 100%; border: none; cursor: pointer"
        >
          Submit Review
        </button>
        <button
          onclick="closeModal()"
          style="
            background: none;
            border: none;
            color: gray;
            margin-top: 15px;
            cursor: pointer;
            width: 100%;
          "
        >
          Cancel
        </button>
      </div>
    </div>

    <script>
      let allBags = [];
      let displayedBags = [];
      let currentBagId = null;

      async function load() {
        const fetchJson = async (url) => {
          const res = await fetch(url);
          if (!res.ok) throw new Error(`Request failed: ${url}`);
          return res.json();
        };

        try {
          let products = [];

          // First check localStorage for admin-added products
          const adminProducts = localStorage.getItem("adminProducts");
          if (adminProducts) {
            products = JSON.parse(adminProducts);
          }

          // If no local products, try API
          if (!Array.isArray(products) || products.length === 0) {
            try {
              products = await fetchJson("/api/products");
            } catch (_) {
              products = [];
            }
          }

          // If API fails or is empty, try local JSON files (works in Live Server/static mode).
          if (!Array.isArray(products) || products.length === 0) {
            const fallbacks = [
              "products.json",
              "./products.json",
              "../products.json",
              "/products.json",
            ];
            for (const url of fallbacks) {
              try {
                products = await fetchJson(url);
                if (Array.isArray(products) && products.length > 0) break;
              } catch (_) {
                // Continue trying the next fallback URL.
              }
            }
          }

          if (!Array.isArray(products) || products.length === 0) {
            throw new Error("No products available");
          }

          allBags = products;
          displayedBags = [...allBags];
          applyCategoryFromUrl();
          render(displayedBags);
        } catch (error) {
          const container = document.getElementById("shop-container");
          container.innerHTML =
            "<p style='grid-column:1/-1;color:#d63031;text-align:center;'>Failed to load products. Please refresh.</p>";
        }
      }

      function render(items) {
        const container = document.getElementById("shop-container");

        if (items.length === 0) {
          container.innerHTML = `
                <div style="grid-column: 1/-1; text-align:center; padding: 80px 20px;">
                    <i class="fa fa-search" style="font-size:40px; color:#ddd; margin-bottom:15px;"></i>
                    <h3>No bags found</h3>
                    <p style="color:gray;">Try a different search term or category.</p>
                </div>`;
          return;
        }

        container.innerHTML = items
          .map((bag) => {
            const reviews = bag.reviews || [];
            const productId = bag._id || "";
            const rawImage =
              typeof bag.image === "string" ? bag.image.trim() : "";
            let imageSrc = "images/bag-placeholder.svg";
            if (rawImage) {
              if (
                /^(https?:)?\/\//i.test(rawImage) ||
                rawImage.startsWith("data:")
              ) {
                imageSrc = rawImage;
              } else if (rawImage.startsWith("/")) {
                imageSrc = rawImage;
              } else if (
                rawImage.startsWith("images/") ||
                rawImage.startsWith("./images/")
              ) {
                imageSrc = rawImage.replace(/^\.\//, "");
              } else {
                imageSrc = `images/${rawImage}`;
              }
            }
            const avgRating =
              reviews.length > 0
                ? (
                    reviews.reduce((a, b) => a + parseInt(b.rating), 0) /
                    reviews.length
                  ).toFixed(1)
                : "5.0";

            // Show "New" badge for the most recent 4 items
            const isNew =
              allBags.indexOf(bag) < 4 ? '<span class="badge">New</span>' : "";

            return `
                <div class="bag-card">
                    ${isNew}
                    <!-- UPDATED LINE BELOW: Added onclick to open the lightbox -->
                    <img src="${imageSrc}" 
                         onclick="openLightbox('${imageSrc}', '${bag.name}')" 
                         style="cursor: zoom-in;" 
                         onerror="this.onerror=null;this.src='images/bag-placeholder.svg'">
                    
                    <div class="bag-specs">
                        <span><i class="fa fa-tag"></i> ${bag.category}</span>
                        <span><i class="fa fa-check"></i> In Stock</span>
                    </div>
                    <h3>${bag.name}</h3>
                    <div class="stars">
                        <i class="fas fa-star"></i> ${avgRating} 
                        <span class="review-count" onclick="openReviewModal('${productId}')">(${reviews.length} reviews)</span>
                    </div>
                    <p style="font-weight:bold; color:var(--accent); font-size: 1.1rem;">UGX ${Number(bag.price).toLocaleString()}</p>
                    <div style="display:flex;gap:10px;">
                        <button onclick="addToCartFromShop('${bag.id}', '${bag.name}', ${bag.price}, '${bag.image}')" 
                            style="flex:1;padding:10px;background:#25D366;color:white;border:none;border-radius:8px;cursor:pointer;">
                            <i class="fas fa-cart-plus"></i> Add to Cart
                        </button>
                        <a href="https://wa.me/256764266189?text=Hello%20Your%20Bags%20Kampala!%20I%20want%20to%20order%20the%20${encodeURIComponent(bag.name)}" 
                           target="_blank" class="cta-wa" style="flex:1;padding:10px;text-align:center;text-decoration:none;">
                            <i class="fab fa-whatsapp"></i>
                        </a>
                    </div>
                </div>
                `;
          })
          .join("");
      }

      // ADD THIS NEW FUNCTION BELOW THE RENDER FUNCTION
      function openLightbox(src, name) {
        document.getElementById("modalImg").src = src;
        document.getElementById("modalName").innerText = name;
        document.getElementById("imageModal").style.display = "flex";
      }

      function handleSearch() {
        const query = document
          .getElementById("searchInput")
          .value.toLowerCase();
        displayedBags = allBags.filter(
          (bag) =>
            bag.name.toLowerCase().includes(query) ||
            bag.category.toLowerCase().includes(query),
        );
        render(displayedBags);
      }

      function filterBags(category, btn) {
        const buttons = document.querySelectorAll(".f-btn");
        buttons.forEach((b) => b.classList.remove("active"));

        const buttonToActivate =
          btn || Array.from(buttons).find((b) => b.dataset.cat === category);
        if (buttonToActivate) buttonToActivate.classList.add("active");

        if (category === "all") displayedBags = [...allBags];
        else
          displayedBags = allBags.filter(
            (b) => b.category.toLowerCase() === category.toLowerCase(),
          );

        render(displayedBags);
      }

      function applyCategoryFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const category = params.get("cat");
        if (category) {
          filterBags(category, null);
        }
      }

      function handleSort() {
        const order = document.getElementById("sortOrder").value;
        if (order === "low") {
          displayedBags.sort(
            (a, b) => Number(a.price || 0) - Number(b.price || 0),
          );
        } else if (order === "high") {
          displayedBags.sort(
            (a, b) => Number(b.price || 0) - Number(a.price || 0),
          );
        } else {
          load(); // Reload original order
          return;
        }
        render(displayedBags);
      }

      function openReviewModal(productId) {
        if (!productId) {
          alert(
            "Reviews are enabled after products are saved in your database.",
          );
          return;
        }

        currentBagId = productId;
        document.getElementById("reviewModal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("reviewModal").style.display = "none";
      }

      async function submitReview() {
        const name = document.getElementById("revName").value.trim();
        const comment = document.getElementById("revComment").value.trim();
        if (!name || !comment) return alert("Please fill all fields");
        if (!currentBagId) return alert("Please choose a product again.");

        const review = {
          user: name,
          rating: document.getElementById("revRating").value,
          comment: comment,
        };

        const res = await fetch(`/api/products/${currentBagId}/review`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(review),
        });
        if (!res.ok) return alert("Failed to submit review. Please try again.");

        alert("Thank you! Review submitted.");
        closeModal();
        document.getElementById("revName").value = "";
        document.getElementById("revComment").value = "";
        load();
      }

      load();
    </script>

    <!-- Shopping Cart Sidebar -->
    <div id="cartSidebar" class="cart-sidebar" style="z-index: 10001">
      <div

        <p class="empty-cart">Your cart is empty</p>
      </div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total:</span>
          <span id="cartTotalAmount" style="color: #25d366; font-weight: bold"
            >UGX 0</span
          >
        </div>
        <button
          onclick="openCheckoutModal()"
          class="checkout-btn"
          style="background: #25d366"
        >
          <i class="fab fa-whatsapp"></i> Checkout via WhatsApp
        </button>
      </div>
    </div>

    <!-- Cart Overlay -->
    <div
      id="cartOverlay"
      class="cart-overlay"
      onclick="closeCart()"
      style="z-index: 10000"
    ></div>

    <!-- Checkout Modal -->
    <div
      id="checkoutModal"
      class="cart-sidebar"
      style="right: 0; width: 100%; max-width: 400px; z-index: 10002"
    >
      <div class="cart-header">
        <h3>Checkout</h3>
        <button
          type="button"
          class="close-cart"
          onclick="
            document.getElementById('checkoutModal').classList.remove('active');
            document
              .getElementById('checkoutOverlay')
              .classList.remove('active');
          "
          aria-label="Close"
          style="
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            color: white;
            font-size: 28px;
            cursor: pointer;
          "
        >
          ✕
        </button>
      </div>
      <form
        id="checkoutForm"
        onsubmit="processPaymentShop(event)"
        style="padding: 20px"
      >
        <h4 style="margin: 15px 0 10px; color: #333">Delivery Information</h4>
        <input
          type="text"
          id="deliveryName"
          placeholder="Full Name"
          required
          style="
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
          "
        />
        <input
          type="tel"
          id="deliveryPhone"
          placeholder="Phone Number (e.g., 2567xxxxxxx)"
          required
          pattern="[0-9]{10,12}"
          style="
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
          "
        />
        <input
          type="email"
          id="deliveryEmail"
          placeholder="Email (optional)"
          style="
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
          "
        />
        <input
          type="text"
          id="deliveryAddress"
          placeholder="Delivery Address"
          required
          style="
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
          "
        />
        <select
          id="paymentMethod"
          required
          style="
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
          "
        >
          <option value="">Select Payment Method</option>
          <option value="Cash on Delivery">Cash on Delivery</option>
          <option value="Mobile Money">Mobile Money</option>
          <option value="Bank Transfer">Bank Transfer</option>
        </select>
        <div class="cart-total" style="margin: 15px 0">
          <span>Total:</span>
          <span id="checkoutTotal" style="color: #25d366; font-weight: bold"
            >UGX 0</span
          >
        </div>
        <button type="submit" class="checkout-btn" style="background: #25d366">
          <i class="fab fa-whatsapp"></i> Place Order
        </button>
      </form>
    </div>
    <div
      id="checkoutOverlay"
      class="cart-overlay"
      onclick="closeCheckoutModal()"
      style="z-index: 10001"
    ></div>

    <!-- Floating Cart Button -->
    <div
      class="whatsapp-float"
      onclick="openCart()"
      style="bottom: 80px; cursor: pointer"
    >
      <i class="fas fa-shopping-cart"></i>
      <span
        id="cartBadge"
        style="
          position: absolute;
          top: -5px;
          right: -5px;
          background: red;
          color: white;
          border-radius: 50%;
          width: 20px;
          height: 20px;
          font-size: 12px;
          display: flex;
          align-items: center;
          justify-content: center;
        "
        >0</span
      >
    </div>

    <script>
      // Cart functionality for shop page
      let cart = JSON.parse(localStorage.getItem("cart") || "[]");

      function addToCartFromShop(id, name, price, image) {
        const existing = cart.find((item) => item.id === id);
        if (existing) {
          existing.qty++;
        } else {
          cart.push({ id: id, name: name, price: price, image: image, qty: 1 });
        }
        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartCount();
        openCart();
      }

      function openCart() {
        document.getElementById("cartSidebar").classList.add("active");
        document.getElementById("cartOverlay").classList.add("active");
        renderCartItems();
      }

      function closeCart() {
        document.getElementById("cartSidebar").classList.remove("active");
        document.getElementById("cartOverlay").classList.remove("active");
      }

      function renderCartItems() {
        const container = document.getElementById("cartItems");
        if (cart.length === 0) {
          container.innerHTML = '<p class="empty-cart">Your cart is empty</p>';
          document.getElementById("cartTotalAmount").textContent = "UGX 0";
          return;
        }

        let html = "";
        let total = 0;
        cart.forEach((item, index) => {
          const itemTotal = item.price * item.qty;
          total += itemTotal;
          html += `
            <div class="cart-item">
              <img src="${item.image || "images/bag-placeholder.svg"}" alt="${item.name}" />
              <div class="cart-item-info">
                <h4>${item.name}</h4>
                <p class="price">UGX ${item.price.toLocaleString()}</p>
                <div class="cart-item-qty">
                  <button onclick="changeQty(${index}, -1)">-</button>
                  <span>${item.qty}</span>
                  <button onclick="changeQty(${index}, 1)">+</button>
                </div>
              </div>
              <button onclick="removeFromCart(${index})" style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:18px;">&times;</button>
            </div>
          `;
        });

        container.innerHTML = html;
        document.getElementById("cartTotalAmount").textContent =
          "UGX " + total.toLocaleString();
      }

      function changeQty(index, delta) {
        cart[index].qty += delta;
        if (cart[index].qty <= 0) {
          cart.splice(index, 1);
        }
        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartCount();
        renderCartItems();
      }

      function removeFromCart(index) {
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartCount();
        renderCartItems();
      }

      function updateCartCount() {
        const count = cart.reduce((sum, item) => sum + item.qty, 0);
        document.getElementById("cartBadge").textContent = count;
      }

      function checkoutViaWhatsApp() {
        if (cart.length === 0) {
          alert("Your cart is empty!");
          return;
        }
        // Open checkout modal instead
        openCheckoutModal();
      }

      function openCheckoutModal() {
        if (cart.length === 0) {
          alert("Your cart is empty!");
          return;
        }
        let total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
        document.getElementById("checkoutTotal").textContent =
          "UGX " + total.toLocaleString();
        document.getElementById("checkoutModal").classList.add("active");
        document.getElementById("checkoutOverlay").classList.add("active");
      }

      function closeCheckoutModal() {
        document.getElementById("checkoutModal").classList.remove("active");
        document.getElementById("checkoutOverlay").classList.remove("active");
      }

      function processPaymentShop(e) {
        e.preventDefault();
        const name = document.getElementById("deliveryName").value;
        const phone = document.getElementById("deliveryPhone").value;
        const address = document.getElementById("deliveryAddress").value;
        const payment = document.getElementById("paymentMethod").value;
        let total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

        // Save customer to localStorage
        const customers = JSON.parse(localStorage.getItem("customers") || "[]");
        const customerData = {
          name,
          phone,
          email: document.getElementById("deliveryEmail")?.value || "",
          location: address,
          date: new Date().toLocaleDateString(),
        };
        // Add if not already exists
        if (!customers.find((c) => c.phone === phone)) {
          customers.push(customerData);
          localStorage.setItem("customers", JSON.stringify(customers));
        }

        // Save order to localStorage
        const orders = JSON.parse(localStorage.getItem("orders") || "[]");
        const orderData = {
          id: Date.now(),
          customerName: name,
          phone,
          address,
          items: cart.map((item) => ({
            name: item.name,
            price: item.price,
            qty: item.qty,
          })),
          total,
          payment,
          status: "Pending",
          date: new Date().toLocaleDateString(),
        };
        orders.push(orderData);
        localStorage.setItem("orders", JSON.stringify(orders));

        let message = `*New Order - Payment: ${payment}*%0A%0A*Customer:* ${name}%0A*Phone:* ${phone}%0A*Address:* ${address}%0A%0A*Items:*%0A`;
        cart.forEach((item) => {
          message += `• ${item.name} x${item.qty} = UGX ${(item.price * item.qty).toLocaleString()}%0A`;
        });
        message += `%0A*Total: UGX ${total.toLocaleString()}*%0A%0ANew order received!`;

        // Close forms and clear cart
        closeCheckoutModal();
        closeCart();
        cart = [];
        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartCount();

        // Send to WhatsApp
        window.open(`https://wa.me/256764266189?text=${message}`, "_blank");
        alert("Order placed successfully! We will contact you shortly.");
      }

      // Initialize cart count on page load
      updateCartCount();
    </script>
  </body>
</html>
