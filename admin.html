<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard | Your Bags Kampala</title>
    <link rel="stylesheet" href="css/base.css" />
    <style>
      body {
        padding: 40px 8%;
        font-family: "Inter", sans-serif;
        background: #fff;
      }
      .admin-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
        align-items: start;
      }

      /* Form Styling */
      .admin-box {
        background: #fdfaf7;
        padding: 30px;
        border-radius: 20px;
        border: 1px solid #eee;
      }
      input,
      select {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 10px;
        border: 1px solid #ddd;
        outline: none;
      }
      label {
        font-size: 12px;
        font-weight: bold;
        color: #2ecc71;
        display: block;
        margin-bottom: 5px;
      }
      .upload-btn {
        background: #2ecc71;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 12px;
        width: 100%;
        font-weight: bold;
        cursor: pointer;
      }

      /* Inventory List Styling */
      .inventory-section {
        background: white;
      }
      .inventory-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 15px;
        margin-top: 20px;
      }
      .inv-card {
        border: 1px solid #eee;
        padding: 10px;
        border-radius: 15px;
        text-align: center;
        background: #f9f9f9;
      }
      .inv-card img {
        width: 100%;
        height: 100px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 10px;
      }
      .delete-btn {
        background: #ff4757;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 12px;
        margin-top: 5px;
      }
      .status {
        margin-top: 12px;
        font-size: 14px;
      }
      .status.ok {
        color: #2e7d32;
      }
      .status.error {
        color: #c62828;
      }

      @media (max-width: 768px) {
        .admin-layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>Manage Inventory</h1>
    <p style="color: gray; margin-bottom: 30px">
      Add or remove bags from your online shop.
    </p>

    <div class="admin-layout">
      <!-- LEFT SIDE: THE FORM -->
      <div class="admin-box">
        <form id="addBagForm" enctype="multipart/form-data">
          <label>Bag Name</label>
          <input type="text" id="name" name="name" required />

          <label>Price (Numbers Only)</label>
          <input type="number" id="price" name="price" required />

          <label>Collection</label>
          <select id="category" name="category" required>
            <option value="handbags">Handbags</option>
            <option value="Shoulder Bags">Shoulder Bags</option>
            <option value="Tote Bags">Tote Bags</option>
            <option value="Laptop Bags">Laptop Bags</option>
            <option value="Clutch Bags">Clutch Bags</option>
            <option value="Min Bags">Min Bags</option>
            <option value="Backpack Bags">Backpack Bags</option>
            <option value="Travel Bags">Travel Bags</option>
          </select>

          <label>Select Bag Photo</label>
          <input
            type="file"
            id="imageInput"
            name="image"
            accept="image/*"
            required
          />

          <button type="submit" class="upload-btn">Upload Bag to Store</button>
          <p id="form-status" class="status"></p>
        </form>
      </div>

      <!-- RIGHT SIDE: THE DELETE SECTION -->
      <div class="inventory-section">
        <h2>Live Inventory</h2>
        <p id="inventory-status" class="status"></p>
        <div id="inventory-list" class="inventory-grid">
          <!-- BAGS WILL APPEAR HERE WITH DELETE BUTTONS -->
        </div>
      </div>
    </div>

    <script src="js/runtime-config.js"></script>
    <script src="js/config.js"></script>
    <script>
      // Check password first
      const pass = prompt("Enter Admin Password:");
      if (pass !== "KAMPALA2026") {
        window.location.href = "index.html";
        throw new Error("Unauthorized admin access");
      }

      function setStatus(id, message, type = "") {
        const el = document.getElementById(id);
        el.className = type ? `status ${type}` : "status";
        el.textContent = message;
      }

      async function getErrorMessage(response, fallback) {
        try {
          const data = await response.json();
          return data && data.message ? data.message : fallback;
        } catch (error) {
          return fallback;
        }
      }

      // 1. Function to fetch and show the bags
      async function loadInventory() {
        const container = document.getElementById("inventory-list");
        setStatus("inventory-status", "Loading inventory...");

        try {
          const res = await fetch(apiUrl("/api/products"));
          if (!res.ok) {
            throw new Error(await getErrorMessage(res, "Failed to load inventory."));
          }

          const bags = await res.json();

          if (bags.length === 0) {
            container.innerHTML =
              "<p style='color:gray;'>No bags in store yet.</p>";
            setStatus("inventory-status", "");
            return;
          }

          container.innerHTML = bags
            .map(
              (bag) => `
                <div class="inv-card">
                    <img src="${resolveApiImageUrl(bag.image)}" onerror="this.onerror=null;this.src='images/bag-placeholder.svg'">
                    <p><strong>${bag.name}</strong></p>
                    <button class="delete-btn" onclick="deleteBag('${bag._id}')">Delete</button>
                </div>
            `,
            )
            .join("");

          setStatus("inventory-status", "");
        } catch (error) {
          container.innerHTML = "";
          setStatus(
            "inventory-status",
            error.message || "Failed to load inventory.",
            "error",
          );
        }
      }

      // 2. Function to handle the Upload
      document.getElementById("addBagForm").onsubmit = async (e) => {
        e.preventDefault();
        setStatus("form-status", "Uploading...");
        const formData = new FormData(e.target);

        try {
          const res = await fetch(apiUrl("/api/products"), {
            method: "POST",
            body: formData,
          });

          if (!res.ok) {
            throw new Error(await getErrorMessage(res, "Upload failed."));
          }

          alert("Bag Uploaded!");
          e.target.reset();
          setStatus("form-status", "Upload successful.", "ok");
          loadInventory();
        } catch (error) {
          setStatus("form-status", error.message || "Upload failed.", "error");
        }
      };

      // 3. Function to Delete a bag
      async function deleteBag(id) {
        if (confirm("Are you sure you want to delete this bag?")) {
          setStatus("inventory-status", "Deleting item...");

          try {
            const res = await fetch(apiUrl(`/api/products/${id}`), { method: "DELETE" });
            if (!res.ok) {
              throw new Error(await getErrorMessage(res, "Delete failed."));
            }

            setStatus("inventory-status", "Item deleted.", "ok");
            loadInventory();
          } catch (error) {
            setStatus(
              "inventory-status",
              error.message || "Delete failed.",
              "error",
            );
          }
        }
      }

      // Initial load when page opens
      loadInventory();
    </script>
  </body>
</html>
